services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ../:/app                          # monta raiz do projeto
      - /app/node_modules                 # evita sobrescrever node_modules do container
      - /var/run/docker.sock:/var/run/docker.sock  # docker-outside-of-docker
    working_dir: /app
    command: sleep infinity               # mantém container vivo
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pguser:pgpass@postgres:5432/gex
      WEBHOOK_URL: ${WEBHOOK_URL:-https://webhook.site/your-uuid-here}
    depends_on:
      - redis
      - postgres
    networks:
      - default